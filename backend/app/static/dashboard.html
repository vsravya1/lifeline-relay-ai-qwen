<!DOCTYPE html>
<html>
<head>
<title>Lifeline Relay — Live Dashboard</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, Arial, sans-serif; margin: 0; padding: 24px; background: #fafafa; color: #1a1a1a; }
  .top-header { text-align: center; margin-bottom: 20px; }
  .top-header h1 { font-size: 22px; margin: 0; }
  .top-header .sub { color: #666; font-size: 13px; margin-top: 4px; }

  .layout { display: grid; grid-template-columns: 220px 1fr; gap: 18px; max-width: 1100px; margin: 0 auto; }

  .agents-panel { display: flex; flex-direction: column; gap: 10px; }
  .agent-card { background: white; border: 1px solid #ddd; border-radius: 10px; padding: 12px; }
  .agent-card .name { font-weight: 600; font-size: 13px; }
  .agent-card .role { font-size: 11px; color: #888; margin: 2px 0 8px; }
  .agent-status { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .agent-status.idle { background: #f0f0f0; color: #777; }
  .agent-status.processing { background: #fff3e0; color: #e65100; }
  .agent-status.conflict_found { background: #ffebee; color: #b71c1c; }

  .main-col { display: flex; flex-direction: column; gap: 16px; }

  .zones { display: flex; gap: 12px; }
  .zone-card { flex: 1; background: white; border-radius: 10px; padding: 14px; border: 2px solid #eee; }
  .zone-card.low { border-color: #4caf50; }
  .zone-card.medium { border-color: #ff9800; }
  .zone-card.high { border-color: #f44336; }
  .zone-card.critical { border-color: #b71c1c; background: #fff5f5; }
  .zone-id { font-weight: 600; font-size: 14px; text-transform: uppercase; }
  .risk-badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; margin-top: 6px; }
  .risk-badge.low { background: #e8f5e9; color: #1b5e20; }
  .risk-badge.medium { background: #fff3e0; color: #e65100; }
  .risk-badge.high { background: #ffebee; color: #b71c1c; }
  .risk-badge.critical { background: #b71c1c; color: white; }
  .stat-row { font-size: 11px; color: #555; margin-top: 6px; }

  .conflict-card { background: #fff8e1; border: 2px solid #f9a825; border-radius: 10px; padding: 16px; }
  .conflict-card h2 { margin: 0 0 8px; font-size: 14px; color: #e65100; }
  .hitl-badge { display: inline-block; background: #e65100; color: white; font-size: 10px; font-weight: 700; letter-spacing: 0.5px; padding: 3px 8px; border-radius: 4px; margin-bottom: 8px; }
  .conflict-claim { font-size: 12px; margin: 5px 0; padding: 6px 8px; background: white; border-radius: 6px; }
  .conflict-claim .label { font-weight: 600; }
  .conflict-resolution { margin-top: 10px; padding: 8px; background: #fff; border-radius: 6px; font-size: 12px; }
  .conflict-resolution .winner { color: #1b5e20; font-weight: 600; }
  .conflict-buttons { margin-top: 10px; }
  .conflict-buttons button { margin-right: 8px; padding: 7px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; }
  .btn-approve { background: #2e7d32; color: white; }
  .btn-reject { background: #c62828; color: white; }

  .chat-log { background: white; border: 1px solid #ddd; border-radius: 10px; padding: 14px; max-height: 320px; overflow-y: auto; }
  .chat-log h2 { margin: 0 0 10px; font-size: 14px; }
  .chat-entry { display: flex; gap: 8px; padding: 7px 0; border-top: 1px solid #f3f3f3; font-size: 12.5px; }
  .chat-entry:first-child { border-top: none; }
  .agent-tag { font-weight: 600; padding: 1px 7px; border-radius: 4px; font-size: 11px; white-space: nowrap; height: fit-content; }
  .agent-tag.WatcherAgent { background: #e3f2fd; color: #0d47a1; }
  .agent-tag.ResponderAgent { background: #f3e5f5; color: #6a1b9a; }
  .agent-tag.CoordinatorAgent { background: #ffebee; color: #b71c1c; }
  .agent-tag.RecoveryAgent { background: #e8f5e9; color: #1b5e20; }
  .chat-text .headline { color: #1a1a1a; }
  .chat-text .detail { color: #777; font-size: 11.5px; margin-top: 1px; }
  .chat-time { color: #aaa; font-size: 10.5px; margin-left: auto; white-space: nowrap; }
  .empty { color: #999; font-size: 13px; padding: 6px 0; }

  .demo-controls { background: white; border: 1px solid #ddd; border-radius: 10px; padding: 14px; }
  .demo-controls h2 { margin: 0 0 10px; font-size: 13px; color: #555; }
  .demo-row { display: flex; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
  .demo-row .group-label { font-size: 11px; color: #999; width: 100%; }
  .demo-btn { padding: 9px 14px; border-radius: 6px; border: 1px solid #ccc; background: #fafafa; cursor: pointer; font-size: 12.5px; }
  .demo-btn:hover { background: #f0f0f0; }
  .demo-btn:disabled { opacity: 0.5; cursor: wait; }

  .nav { text-align: center; margin-top: 14px; }
  .nav a { color: #999; text-decoration: none; font-size: 12px; }

  .photo-gallery { display: flex; gap: 12px; }
  .photo-card { flex: 1; background: white; border-radius: 10px; overflow: hidden; border: 1px solid #ddd; }
  .photo-card.pending { border: 2px solid #f9a825; }
  .photo-card.approved { border: 2px solid #2e7d32; }
  .photo-card.rejected { border: 2px solid #c62828; opacity: 0.7; }
  .photo-card img { width: 100%; height: 140px; object-fit: cover; display: block; }
  .photo-card .photo-body { padding: 10px; }
  .photo-card .photo-zone { font-weight: 600; font-size: 12px; text-transform: uppercase; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }
  .pending-tag { background: #fff3e0; color: #e65100; font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px; }
  .approved-tag { background: #e8f5e9; color: #1b5e20; font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px; }
  .rejected-tag { background: #ffebee; color: #b71c1c; font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px; }
  .photo-card .photo-finding { font-size: 11.5px; color: #444; margin-bottom: 6px; }
  .photo-card textarea.edit-desc { width: 100%; font-size: 11px; border: 1px solid #ccc; border-radius: 4px; padding: 5px; margin-bottom: 6px; resize: vertical; }
  .photo-card input.edit-severity { width: 50px; font-size: 11px; border: 1px solid #ccc; border-radius: 4px; padding: 3px 5px; }
  .photo-card .photo-scores { display: flex; gap: 8px; font-size: 11px; align-items: center; margin-bottom: 8px; }
  .photo-card .score-pill { background: #f0f0f0; padding: 2px 7px; border-radius: 10px; }
  .photo-card .score-pill.priority { background: #ffebee; color: #b71c1c; font-weight: 600; }
  .photo-review-buttons { display: flex; gap: 6px; }
  .photo-review-buttons button { flex: 1; font-size: 11px; padding: 6px; border-radius: 5px; border: none; cursor: pointer; }
  .btn-photo-approve { background: #2e7d32; color: white; }
  .btn-photo-reject { background: #c62828; color: white; }
  .review-result { font-size: 10.5px; color: #777; margin-top: 6px; font-style: italic; }

  .relief-section { background: white; border: 1px solid #ddd; border-radius: 10px; padding: 14px; }
  .relief-section h2 { margin: 0 0 4px; font-size: 14px; }
  .relief-section .relief-sub { font-size: 11px; color: #999; margin-bottom: 12px; }
  .relief-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .relief-bar-row .relief-zone { width: 60px; font-weight: 600; font-size: 12px; text-transform: uppercase; }
  .relief-bar-track { flex: 1; height: 18px; background: #f0f0f0; border-radius: 9px; overflow: hidden; }
  .relief-bar-fill { height: 100%; background: #1b5e20; border-radius: 9px; transition: width 0.4s; }
  .relief-units { width: 90px; text-align: right; font-size: 12px; font-weight: 600; }
  .relief-pending { font-size: 11px; color: #999; margin-top: 6px; }
</style>
</head>
<body>

<div class="top-header">
  <h1>Qwen Hackathon — Lifeline Relay AI</h1>
  <div class="sub">Multi-agent disaster intelligence — before, during, and after</div>
</div>

<div class="layout">

  <div class="agents-panel" id="agents-panel"></div>

  <div class="main-col">
    <div class="zones" id="zones"></div>
    <div id="conflicts-section"></div>
    <div id="photo-gallery-section"></div>
    <div id="relief-allocation-section"></div>
    <div class="chat-log">
      <h2>Agent activity log</h2>
      <div id="timeline"></div>
    </div>

    <div class="demo-controls">
      <h2>Demo sequence</h2>
      <div class="demo-row">
        <span class="group-label">Phase 1 — Weather</span>
        <button class="demo-btn" onclick="runStep('/demo/phase1/step1', this)">9:00 AM — Initial signals</button>
        <button class="demo-btn" onclick="runStep('/demo/phase1/step2', this)">10:15 AM — Zone B worsens</button>
      </div>
      <div class="demo-row">
        <span class="group-label">Phase 2 — SOS</span>
        <button class="demo-btn" onclick="runStep('/demo/phase2/step1', this)">10:20 AM — First SOS wave</button>
        <button class="demo-btn" onclick="runStep('/demo/phase2/step2', this)">10:45 AM — Contradicting reports</button>
      </div>
      <div class="demo-row">
        <span class="group-label">Phase 3 — Recovery</span>
        <button class="demo-btn" onclick="runStep('/demo/phase3/step1', this)">11:30 AM — Damage reports</button>
      </div>
    </div>
  </div>

</div>

<div class="nav"><a href="/simulator">Simulator (manual test data) →</a></div>

<script>
const AGENT_INFO = {
  WatcherAgent: { role: 'Phase 1 — weather risk' },
  ResponderAgent: { role: 'Phase 2 — SOS triage' },
  CoordinatorAgent: { role: 'Conflict arbitration' },
  RecoveryAgent: { role: 'Phase 3 — damage' },
};

function riskClass(level) { return level || 'low'; }

function statusLabel(status) {
  if (status === 'conflict_found') return 'Conflict found';
  if (status === 'processing') return 'Processing';
  return 'Idle';
}

async function refresh() {
  try {
    const [zonesRes, timelineRes, conflictsRes, statusRes, damageRes, reliefRes] = await Promise.all([
      fetch('/zones'), fetch('/timeline'), fetch('/conflicts'), fetch('/agent-status'), fetch('/damage-reports'), fetch('/relief-allocation')
    ]);
    const zones = await zonesRes.json();
    const timeline = await timelineRes.json();
    const conflicts = await conflictsRes.json();
    const agentStatus = await statusRes.json();
    const damageReports = await damageRes.json();
    const relief = await reliefRes.json();

    const agentsEl = document.getElementById('agents-panel');
    agentsEl.innerHTML = Object.entries(AGENT_INFO).map(([name, info]) => `
      <div class="agent-card">
        <div class="name">${name}</div>
        <div class="role">${info.role}</div>
        <span class="agent-status ${agentStatus[name] || 'idle'}">${statusLabel(agentStatus[name])}</span>
      </div>
    `).join('');

    const zonesEl = document.getElementById('zones');
    if (zones.length === 0) {
      zonesEl.innerHTML = '<div class="empty">No zones yet — run a demo step below.</div>';
    } else {
      zonesEl.innerHTML = zones.map(z => `
        <div class="zone-card ${riskClass(z.current_risk_level)}">
          <div class="zone-id">${z.zone_id}</div>
          <span class="risk-badge ${riskClass(z.current_risk_level)}">${z.current_risk_level.toUpperCase()}</span>
          <div class="stat-row">SOS: ${z.sos_count} (${z.critical_sos_count} critical)</div>
          <div class="stat-row">Vulnerable flags: ${z.vulnerability_flags_count}</div>
          ${z.active_conflict ? '<div class="stat-row" style="color:#b71c1c;font-weight:600;">⚠ Active conflict</div>' : ''}
        </div>
      `).join('');
    }

    const conflictsEl = document.getElementById('conflicts-section');
    const pendingConflicts = conflicts.filter(c => c.human_approved === null);
    if (pendingConflicts.length === 0) {
      conflictsEl.innerHTML = '';
    } else {
      conflictsEl.innerHTML = pendingConflicts.map(c => `
        <div class="conflict-card">
          <span class="hitl-badge">⏸ Human review required</span>
          <h2>⚠ Conflict detected in ${c.zone_id}</h2>
          <div class="conflict-claim"><span class="label">Source A (sensor):</span> ${c.claim_a}</div>
          <div class="conflict-claim"><span class="label">Source B (citizens):</span> ${c.claim_b}</div>
          <div class="conflict-resolution">
            <span class="winner">Coordinator recommends: ${c.winning_source.replace('_', ' ')}</span><br/>
            ${c.reasoning}
          </div>
          <div class="conflict-buttons">
            <button class="btn-approve" onclick="approveConflict('${c.conflict_id}', true)">✓ Approve — escalate zone</button>
            <button class="btn-reject" onclick="approveConflict('${c.conflict_id}', false)">✗ Reject — keep sensor reading</button>
          </div>
        </div>
      `).join('');
    }

    const galleryEl = document.getElementById('photo-gallery-section');
    if (damageReports.length === 0) {
      galleryEl.innerHTML = '';
    } else {
      galleryEl.innerHTML = `<div class="photo-gallery">` + damageReports.map(r => {
        const statusClass = r.human_approved === true ? 'approved' : r.human_approved === false ? 'rejected' : 'pending';
        const tag = r.human_approved === true
          ? '<span class="approved-tag">✓ Approved</span>'
          : r.human_approved === false
          ? '<span class="rejected-tag">✗ Rejected</span>'
          : '<span class="pending-tag">⏸ Pending review</span>';
        const isPending = r.human_approved === null;
        const displayDescription = r.edited_image_description || r.image_description;
        const displaySeverity = r.edited_severity_score !== null && r.edited_severity_score !== undefined ? r.edited_severity_score : r.severity_score;

        return `
        <div class="photo-card ${statusClass}">
          <img src="/static/images/${r.zone_id}.jpg" alt="${r.zone_id} damage photo" />
          <div class="photo-body">
            <div class="photo-zone">${r.zone_id} ${tag}</div>
            ${isPending
              ? `<textarea class="edit-desc" id="desc-${r.report_id}" rows="2">${r.image_description}</textarea>
                 <div class="photo-scores">
                   Severity: <input class="edit-severity" id="sev-${r.report_id}" type="number" step="0.1" min="0" max="10" value="${r.severity_score}" />
                   <span class="score-pill priority">Priority: ${r.final_priority_score.toFixed(1)}</span>
                 </div>
                 <div class="photo-review-buttons">
                   <button class="btn-photo-approve" onclick="approveDamage('${r.report_id}', true)">✓ Approve</button>
                   <button class="btn-photo-reject" onclick="approveDamage('${r.report_id}', false)">✗ Reject</button>
                 </div>`
              : `<div class="photo-finding">${displayDescription}</div>
                 <div class="photo-scores">
                   <span class="score-pill">Severity: ${displaySeverity.toFixed(1)}</span>
                   <span class="score-pill priority">Priority: ${r.final_priority_score.toFixed(1)}</span>
                 </div>
                 ${r.human_approved === false ? '<div class="review-result">Excluded from relief priority ranking</div>' : ''}
                 ${r.edited_severity_score !== null && r.edited_severity_score !== undefined ? `<div class="review-result">Qwen-VL originally proposed ${r.severity_score.toFixed(1)} — human corrected</div>` : ''}`
            }
          </div>
        </div>
      `}).join('') + `</div>`;
    }

    const reliefEl = document.getElementById('relief-allocation-section');
    if (relief.allocations.length === 0) {
      reliefEl.innerHTML = '';
    } else {
      const maxUnits = Math.max(...relief.allocations.map(a => a.units), 1);
      reliefEl.innerHTML = `
        <div class="relief-section">
          <h2>Relief allocation — Phase 3 (recovery)</h2>
          <div class="relief-sub">Based on approved priority scores · ${relief.allocated_units} of ${relief.total_units} relief units assigned</div>
          ${relief.allocations.map(a => `
            <div class="relief-bar-row">
              <div class="relief-zone">${a.zone_id}</div>
              <div class="relief-bar-track">
                <div class="relief-bar-fill" style="width:${(a.units / relief.total_units * 100).toFixed(0)}%"></div>
              </div>
              <div class="relief-units">${a.units} of ${relief.total_units} units</div>
            </div>
          `).join('')}
          ${relief.pending_zones.length > 0 ? `<div class="relief-pending">Waiting on approval: ${relief.pending_zones.join(', ')} — not yet included in allocation</div>` : ''}
        </div>
      `;
    }

    const timelineEl = document.getElementById('timeline');
    const sorted = [...timeline].sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
    if (sorted.length === 0) {
      timelineEl.innerHTML = '<div class="empty">No activity yet — run a demo step below.</div>';
    } else {
      timelineEl.innerHTML = sorted.map(t => `
        <div class="chat-entry">
          <span class="agent-tag ${t.agent}">${t.agent}</span>
          <div class="chat-text">
            <div class="headline">${t.headline}</div>
            <div class="detail">${t.detail}</div>
          </div>
          <span class="chat-time">${new Date(t.timestamp).toLocaleTimeString()}</span>
        </div>
      `).join('');
      timelineEl.scrollTop = timelineEl.scrollHeight;
    }
  } catch (e) {
    console.error('Refresh failed', e);
  }
}

async function approveConflict(conflictId, approved) {
  await fetch(`/coordinator/approve?conflict_id=${conflictId}&approved=${approved}`, { method: 'POST' });
  refresh();
}

async function approveDamage(reportId, approved) {
  let url = `/recovery/approve?report_id=${reportId}&approved=${approved}`;
  if (approved) {
    const sevInput = document.getElementById(`sev-${reportId}`);
    const descInput = document.getElementById(`desc-${reportId}`);
    if (sevInput) url += `&edited_severity_score=${sevInput.value}`;
    if (descInput) url += `&edited_image_description=${encodeURIComponent(descInput.value)}`;
  }
  await fetch(url, { method: 'POST' });
  refresh();
}

async function runStep(endpoint, btnEl) {
  btnEl.disabled = true;
  try {
    await fetch(endpoint, { method: 'POST' });
    await refresh();
  } catch (e) {
    console.error('Step failed', e);
  } finally {
    btnEl.disabled = false;
  }
}

refresh();
setInterval(refresh, 4000);
</script>

</body>
</html>
